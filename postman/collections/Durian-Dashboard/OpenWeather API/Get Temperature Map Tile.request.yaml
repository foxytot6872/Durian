$kind: http-request
name: Get Temperature Map Tile
method: GET
url: 'https://tile.openweathermap.org/map/temp_new/{z}/{x}/{y}.png'
order: 4000
pathVariables:
  - key: z
    value: '1'
  - key: x
    value: '1'
  - key: y
    value: '1'
queryParams:
  - key: appid
    value: '{{openweather_api_key}}'
